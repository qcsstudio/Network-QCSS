name: VerifyGrid scanner image

on:
  push:
    branches:
      - main
    paths:
      - "sensor/**"
      - ".github/workflows/verifygrid-sensor-image.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: verifygrid-scanner-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Sign in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate container metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/qcsstudio/network-qcss-verifygrid-sensor
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and publish scanner image
        uses: docker/build-push-action@v6
        with:
          context: sensor
          file: sensor/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true
