name: QCS Advisory Radar

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions: {}

concurrency:
  group: qcs-advisory-radar
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - name: Trigger secured advisory scan
        env:
          CRON_SECRET: ${{ secrets.QCS_CRON_SECRET }}
          ENDPOINT: https://www.qcsstudio.com/api/cron/advisory-discovery
        run: |
          set -euo pipefail
          test -n "$CRON_SECRET"
          status=$(curl --silent --show-error --retry 2 --retry-all-errors \
            --max-time 150 --output response.json --write-out "%{http_code}" \
            --header "Authorization: Bearer $CRON_SECRET" "$ENDPOINT")
          cat response.json
          test "$status" -ge 200 -a "$status" -lt 300
